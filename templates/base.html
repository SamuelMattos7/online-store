<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sabor Latino{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
    <!-- Fixed: was googleapis.com, missing fonts. subdomain -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">🌶️ Sabor Latino</div>
        <div class="navbar-links">
            <a href="/">Inicio</a>
            <a href="/menu">Nuestro Menú</a>
            <a href="/about">Nosotros</a>
            <a href="/cart">🛒 Carrito: <span id="cart-counter">{{ get_cart_total_items(request) }}</span></a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Restaurante Sabor Latino - De nuestra cocina a tu mesa con sazón de verdad.</p>
    </footer>

</body>
</html>
