<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sabor Latino{% endblock %}</title>
    <!-- Importamos los estilos estáticos creados en el Paso 2 -->
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
    <!-- Fuente de Google para mejor diseño -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <!-- Barra de Navegación Común -->
    <nav class="navbar">
        <div class="logo">🌶️ Sabor Latino</div>
        <div class="navbar-links">
            <a href="/">Inicio</a>
            <a href="/menu">Nuestro Menú</a>
            <a href="/about">Nosotros</a>
            <a href="/cart">Carrito</a>
        </div>
    </nav>

    <!-- Aquí se inyectará el contenido específico de cada página -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Pie de Página Común -->
    <footer>
        <p>&copy; 2026 Restaurante Sabor Latino - De nuestra cocina a tu mesa con sazón de verdad.</p>
    </footer>

</body>
</html>
